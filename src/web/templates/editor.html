<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor — Workflow Determinista</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'navbar.html' %}
    <main class="container">
        <div class="page-header"><h1>✏️ Editor de Workflow</h1><a href="/workflows" class="btn">← Volver</a></div>
        <div class="editor-layout">
            <input type="text" id="wfNameInput" placeholder="Nombre del workflow" style="margin-bottom:12px;font-size:1.1rem">
            <div class="editor-toolbar">
                <select id="triggerType"><option value="event">Evento</option><option value="schedule">Programado</option><option value="webhook">Webhook</option><option value="manual">Manual</option></select>
                <input type="text" id="triggerConfig" placeholder='{"event": "crm.lead.created"}' class="input-mono">
            </div>
            <div id="stepsContainer" class="steps-container"></div>
            <button onclick="addStep()" class="btn btn-secondary">+ Agregar paso</button>
            <div class="editor-actions">
                <button onclick="saveWorkflow()" class="btn btn-primary">💾 Guardar</button>
                <button onclick="testWorkflow()" class="btn btn-secondary">▶️ Probar</button>
            </div>
        </div>
    </main>
    <div class="step-template hidden" id="stepTemplate">
        <div class="step-card" data-step-id="">
            <div class="step-header">Paso <span class="step-num"></span></div>
            <select class="step-tool"><option value="crm">CRM</option><option value="invoice">Facturas</option><option value="inventory">Inventario</option><option value="notification">Notificaciones</option><option value="system">Sistema</option></select>
            <input type="text" class="step-action" placeholder="create_lead">
            <textarea class="step-params" placeholder='{"name": "$input.nombre"}' rows="3"></textarea>
            <input type="text" class="step-condition" placeholder="Condición (opcional)">
            <button onclick="this.closest('.step-card').remove()" class="btn btn-sm btn-danger">Eliminar</button>
        </div>
    </div>
    <script src="/static/editor.js"></script>
</body>
</html>
