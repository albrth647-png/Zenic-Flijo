<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Determinista — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">⚙️</div>
                <h1>Workflow Determinista</h1>
                <p class="subtitle">Automatización offline para tu negocio</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="error-message hidden"></div>
                <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
            </form>
            <div class="trial-info" id="trialInfo">
                <span class="trial-badge">⏳ Prueba gratuita</span>
                <span id="trialDays"></span>
            </div>
        </div>
    </div>
    <script>
        const trial = {{ trial|tojson }};
        if (trial && trial.days_left !== undefined) {
            document.getElementById('trialDays').textContent = 
                trial.status === 'expired' ? 'Período de prueba expirado' : `${trial.days_left} días restantes`;
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            errorEl.classList.add('hidden');
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Iniciando sesión...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.error || 'Credenciales inválidas';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Error de conexión';
                errorEl.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.textContent = 'Iniciar sesión';
        });
    </script>
</body>
</html>
