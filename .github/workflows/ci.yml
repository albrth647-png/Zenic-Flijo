# CI para Zenic-Flijo.
# Ejecuta lint + tests + build en cada push y pull request a main.
# Backend Python (ruff + pytest) y Frontend (eslint + tsc + vitest + vite build)
# corren en paralelo para detectar regresiones rápido.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancelar runs anteriores de la misma rama para ahorrar minutos de CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend Python ─────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check (no write)
        run: ruff format --check src/

      - name: Pytest
        env:
          WFD_SESSION_SECRET: ci-test-secret-not-for-production-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          WFD_LICENSE_SECRET: ci-test-license-secret-not-for-production-xxxxxxxxxxxxxxxxxxxxxxxxxx
        run: pytest src/tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=70

  # ─── Frontend TypeScript ────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + React)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript build (tsc -b)
        run: npx tsc -b

      - name: Vite build
        run: npx vite build

      - name: Vitest
        run: npm run test

  # ─── Summary (para saber rápido si todo pasó) ──────────────
  summary:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Check job results
        if: ${{ needs.backend.result != 'success' || needs.frontend.result != 'success' }}
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          exit 1
      - name: All green
        run: echo "✅ Backend and frontend CI passed"
