apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zenic-flujo

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/name: zenic-flujo
  app.kubernetes.io/managed-by: kustomize

secretGenerator:
  - name: zenic-flujo-secrets
    behavior: replace
    type: Opaque

images:
  - name: ghcr.io/albrth647-png/zenic-flujo
    newTag: latest
